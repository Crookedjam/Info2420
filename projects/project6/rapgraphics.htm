<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rent a Pet - Graphics</title>

<style type="text/css">


	#thumbs, #image {
		width: 900px;
		text-align: center;
		margin: 0 auto 0 auto;
		color: #000;
	}

	#thumbs {
		margin-top: 10px;
	}

			
	#thumbs img {
		border: solid 1px #000;
		margin: 5px;
	}

	#image{
		height:500px;
	}

	.instructions{
		font-style:italic;
	}

</style>

<script language="JavaScript" type="text/javascript">

	printbutton1 = new Image
	printbutton2 = new Image
	logo1 = new Image
	logo2 = new Image
if (document.images) {
	printbutton1.src = "images/print/printbutton.png"
	printbutton2.src = "images/print/printbuttonHover.png"
	logo1.src = "images/logo/RAPlogo.png"
	logo2.src = "images/logo/RAPlogoHover.png"
}


		var imgArray = new Array(
			'DogTrick2Lg.jpg',
			'HuntingDogsLg.jpg',
			'KidsDogLg.jpg',
			'Pet1Lg.jpg'
			

		);


		var titleArray = new Array(
			'Dog doing Trick',
			'Two hunting Dogs',
			'Dog and two kids',
			'Woman and Dog'
			
		);
			
		var imgPath = "images/fullsize/";
		
		function swapImage(imgID) {

			var theImage = document.getElementById('theImage');
			var textDiv = document.getElementById('bottomText');

			var newImg;
			var textTitle;

			newImg = imgArray[imgID];
			theImage.src = imgPath + newImg;

			textTitle=titleArray[imgID];

      			textDiv.innerHTML = textTitle;
		}
			
		function preloadImages() {		
			for(var i = 0; i < imgArray.length; i++) {
				var tmpImg = new Image;
				tmpImg.src = imgPath + imgArray[i];
			}
		}
		

</script>


</head>
<body  onload="preloadImages()">

<div align="center">

<div>
	<a href="" onMouseOver="document.printbutton.src=printbutton2.src;"
	onMouseOut="document.printbutton.src=printbutton1.src;">

	<img src="images/print/printbutton.png" width="200" height="50" 
	name="printbutton" alt="PrintButton" style="border:none;"/>

	</a>
</div>


<div id="logo">
	<a href="logo.html" 
	onMouseOver="document.logo.src='images/logo/RAPlogoHover.png';"
	onMouseOut="document.logo.src='images/logo/RAPlogo.png';">

	<img src="images/logo/RAPlogo.png" width="150" height="175" 
	name="logo" alt="logo" style="border:none;"/>

	</a>
</div>

<br />
<br />
<br />
<br />


<div id="thumbs">
		<img src="images/thumbnails/DogTrick2Sm.png" alt="Dog doing Trick" onmouseover="swapImage(0);" />
		<img src="images/thumbnails/HuntingDogsSm.png" alt="Two hunting Dogs" onmouseover="swapImage(1);" />
		<img src="images/thumbnails/KidsDogSm.png" alt="Dog and two kids" onmouseover="swapImage(2);" />
		<img src="images/thumbnails/Pet1Sm.png" alt="Woman and Dog" onmouseover="swapImage(3);" />
		
</div>

	<div id="image">

		<img id="theImage" src="images/fullsize/DogTrickLg.jpg" alt="Dog doing trick" />
		<h3 id="bottomText">Rent A Pet</h3>
	</div>

<img src="images/2colback.jpg">

<br />
<br />
<br />
<br />



</div>

<p>
    <a href="http://validator.w3.org/check?uri=referer"><img
      src="http://www.w3.org/Icons/valid-xhtml10" alt="Valid XHTML 1.0 Transitional" height="31" width="88" /></a>
</p>
  

</body>
</html>
